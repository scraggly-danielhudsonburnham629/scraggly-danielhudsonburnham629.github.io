<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    SENTINEL favicon (v6) — a single filled hexagon with the cyan →
    violet shimmer gradient. No backdrop, no interior wireframe: at
    16 px the thin lines aliased into corner artefacts. A solid
    filled shape renders clean at every browser tab size.
  -->
  <defs>
    <linearGradient id="fv-fill" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6ee7f9"/>
      <stop offset="55%"  stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <polygon points="16,3 27.5,10 27.5,22 16,29 4.5,22 4.5,10" fill="url(#fv-fill)"/>
</svg>
