<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    SENTINEL favicon (v8) — isometric 3D solid, wireframe. Outer
    hexagon + three spokes to the centre = the classic view of a
    cube (or icosahedron facet cluster) seen from a corner. Reads
    as depth, not as a hexagram / Star of David like the previous
    attempts did. Cyan → violet gradient stroke, transparent bg.
  -->
  <defs>
    <linearGradient id="fv-stroke" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6ee7f9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#fv-stroke)" stroke-width="1.8"
     stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer silhouette -->
    <polygon points="16,3 26,9 26,23 16,29 6,23 6,9"/>
    <!-- Three interior spokes to the centre — the depth lines that
         define the visible faces of a corner-on cube/polyhedron. -->
    <line x1="16" y1="3"  x2="16" y2="16"/>
    <line x1="26" y1="23" x2="16" y2="16"/>
    <line x1="6"  y1="23" x2="16" y2="16"/>
  </g>
</svg>
